<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blood Bank Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #E8474C, #ff4d4d);
    }

    /* Card */
    .login-card {
      background: white;
      width: 350px;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
      box-sizing: border-box;
    }

    /* Logo */
    .logo img {
      width: 80px;
      margin-bottom: 10px;
    }

    h2 {
      color: #b30000;
      margin: 10px 0 5px;
    }

    p {
      color: gray;
      font-size: 14px;
    }

    /* Inputs */
    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
      outline: none;
      box-sizing: border-box;
    }

    input:focus {
      border-color: #b30000;
    }

    /* Button */
    button {
      width: 100%;
      padding: 10px;
      background: #b30000;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #800000;
    }

    /* Error */
    #error {
      color: red;
      margin-top: 10px;
    }

    /* Animation */
    .login-card {
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>

</head>

<body>

  <div class="login-card">

    <div class="logo">
      <img src="https://cdn-icons-png.flaticon.com/512/833/833472.png" alt="Blood Bank">
    </div>

    <h2>Blood Bank System</h2>
    <p>Login to your dashboard</p>

    <form onsubmit="login(event)">
      <input type="email" id="username" placeholder="Email Address" required>
      <input type="password" id="password" placeholder="Password" required>

      <button type="submit">Login</button>
      <div id="error"></div>
    </form>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword }
      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc }
      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyAIj38tIL6SJMLGMh6gXVzA7CA1qLMU5vc",
      authDomain: "blood-bank-2d309.firebaseapp.com",
      databaseURL: "https://blood-bank-2d309-default-rtdb.firebaseio.com/",
      projectId: "blood-bank-2d309",
      storageBucket: "blood-bank-2d309.firebasestorage.app",
      messagingSenderId: "1007218222332",
      appId: "1:1007218222332:web:0af86af57b8a32f0746379",
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    // function login(event) {
    //   event.preventDefault();

    //   let username = document.getElementById("username").value;
    //   let password = document.getElementById("password").value;

    //   if (username === "admin" && password === "1234") {
    //     //alert("Login Successful 🩸");
    //     localStorage.setItem("user", username);
    //     window.location.href = "index.html";
    //   } else {
    //     document.getElementById("error").innerText =
    //       "Invalid username or password";
    //   }
    // }
    // ==========login===============
    window.login = async function (event) {
      event.preventDefault();
      let email = document.getElementById("username").value;
      let password = document.getElementById("password").value;
      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        const docRef = doc(db, "users", user.uid);
        const docSnap = await getDoc(docRef);

        if (!docSnap.exists()) {
          document.getElementById("error").innerText = "User not found";
          return;
        }

        const role = docSnap.data().role;

        if (role === "admin") {
          localStorage.setItem("user", user.uid);
          window.location.href = "index.html";
        } else {
          document.getElementById("error").innerText = "Access denied: Only admin can access dashboard";
        }

      } catch (error) {
        console.error("Firebase Error Code:", error.code);

        let message = "Something went wrong";

        switch (error.code) {

          case "auth/invalid-email":
            message = "Invalid email format";
            break;

          case "auth/invalid-credential":
            message = "Incorrect email or password";
            break;

          case "auth/too-many-requests":
            message = "Too many attempts. Try again later";
            break;

          default:
            message = "Login failed. Please try again";
        }

        document.getElementById("error").innerText = message;
      }
    };
  </script>

</body>

</html>
